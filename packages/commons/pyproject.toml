[project]
name = "zeroshot-commons"
version = "0.1.6"
description = "Shared primitives and utilities for Zeroshot Python packages."
readme = "README.md"
requires-python = ">=3.12"
license = "MIT"
dependencies = ["PyYAML>=6.0", "SQLAlchemy>=2.0.40"]

[build-system]
requires = ["uv_build>=0.11.8,<0.12"]
build-backend = "uv_build"
