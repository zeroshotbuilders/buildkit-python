[project]
name = "zeroshot-commons-injectors"
version = "0.1.8"
description = "Dependency Injector containers for Zeroshot infrastructure components."
readme = "README.md"
requires-python = ">=3.12"
license = "MIT"
dependencies = [
  "asyncpg>=0.30.0",
  "dependency-injector>=4.46.0,<5",
  "redis>=5.2.1",
  "SQLAlchemy>=2.0.40",
  "zeroshot-commons==0.1.8",
]

[tool.uv.sources]
zeroshot-commons = { workspace = true }

[build-system]
requires = ["uv_build>=0.11.8,<0.12"]
build-backend = "uv_build"
